<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#9fe3ff" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>풍선 행맨</title>
  <link rel="stylesheet" href="./styles.css?v=0.2.1" />
</head>
<body>
<svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute; left:-9999px; top:-9999px;">
    <filter id="roughPencilEdge" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" seed="8" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.15" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="roughPencilLine" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="2" seed="11" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.65" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
  <div id="app" class="app">
    <section id="startScreen" class="screen startScreen">
      <div class="cloud cloudOne"></div>
      <div class="cloud cloudTwo"></div>
      <div class="cloud cloudThree"></div>

      <button id="soundToggle" class="soundToggle" type="button" aria-pressed="true">🔊 효과음 ON</button>

      <div class="startCard doodlePanel">
        <h1 class="gameTitle">풍선 행맨</h1>
        <p class="subTitle">Balloon Hangman</p>
        <div id="startMascot" class="startMascot characterActor mood-idle" aria-hidden="true"></div>
        <p class="startDescription">풍선이 모두 터지기 전에<br>숨겨진 영어 단어를 맞혀보세요!</p>
        <div class="startActions">
          <button id="startBtn" class="doodleButton primary" type="button">START</button>
          <button id="startHeavenLink" class="doodleButton secondary" type="button">띵보 게임 천국으로 돌아가기</button>
        </div>
      </div>
      <div id="versionText" class="versionText">v0.2.1</div>
    </section>

    <section id="playScreen" class="screen playScreen hidden" aria-live="polite">
      <header class="topBar">
        <button id="backToStartBtn" class="backButton" type="button" aria-label="시작 화면으로 돌아가기">‹</button>
        <div class="topTitle">풍선 행맨</div>
        <div id="balloonCount" class="balloonCount">🎈 7</div>
      </header>

      <main class="playMain">
        <div id="skyArea" class="skyArea">
          <div class="cloud cloudOne"></div>
          <div class="cloud cloudTwo"></div>
          <div id="balloonCluster" class="balloonCluster"></div>
          <svg id="stringBundle" class="stringBundle" viewBox="0 0 286 170" aria-hidden="true" focusable="false"></svg>
          <div id="characterActor" class="characterActor mood-idle" aria-hidden="true"></div>
        </div>

        <section class="wordPanel" aria-label="단어 맞히기 영역">
          <div id="wordSlots" class="wordSlots"></div>
          <div class="hintArea">
            <button id="hintBtn" class="hintButton" type="button">🎈 풍선 찬스</button>
            <div id="hintStatus" class="hintStatus">풍선 1개로 글자 보기</div>
          </div>
          <div id="messageBox" class="messageBox">알파벳을 골라보세요!</div>
        </section>
      </main>

      <nav id="keyboard" class="keyboard" aria-label="알파벳 키보드"></nav>
    </section>

    <div id="resultOverlay" class="resultOverlay hidden" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <div class="resultCard">
        <h2 id="resultTitle" class="resultTitle">CLEAR!</h2>
        <p id="resultNote" class="resultNote">풍선을 지켰어요!</p>
        <p id="resultBalloons" class="resultBalloons">남은 풍선: 7개</p>
        <p class="answerLabel">정답</p>
        <p id="answerWord" class="answerWord">BALLOON</p>
        <p class="answerLabel">뜻</p>
        <p id="answerMeaning" class="answerMeaning">풍선</p>
        <div class="resultActions">
          <button id="againBtn" class="doodleButton primary" type="button">한 번 더</button>
          <button id="resultStartBtn" class="doodleButton ghost" type="button">시작 화면</button>
          <button id="resultHeavenLink" class="doodleButton secondary" type="button">띵보 게임 천국으로 돌아가기</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./words.js?v=0.2.1"></script>
  <script src="./game.js?v=0.2.1"></script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>풍선 행맨</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap");

    :root {
      --paper: #fff8df;
      --paper-deep: #ffeaa4;
      --sky: #bdeeff;
      --sky-deep: #88d9ff;
      --ink: #29201a;
      --soft-ink: #5b4a40;
      --green: #a8ec9b;
      --green-deep: #52bb58;
      --red: #ffb3a6;
      --red-deep: #e86b5a;
      --cream: #fffdf1;
      --shadow: rgba(51, 35, 18, 0.16);
      --version: "v0.1.4";
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #9fe3ff;
      color: var(--ink);
      font-family: ui-rounded, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.55) 0 1.4px, transparent 1.8px),
        radial-gradient(circle at 80% 12%, rgba(255,255,255,0.36) 0 1.2px, transparent 1.7px),
        radial-gradient(circle at 42% 70%, rgba(54,38,26,0.07) 0 0.7px, transparent 1.2px),
        repeating-linear-gradient(107deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 5px),
        repeating-linear-gradient(22deg, rgba(72,51,31,0.055) 0 1px, transparent 1px 7px);
      opacity: 0.86;
      mix-blend-mode: multiply;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 4px),
        repeating-linear-gradient(90deg, rgba(66,44,28,0.025) 0 1px, transparent 1px 6px);
      opacity: 0.55;
      mix-blend-mode: overlay;
    }

    button, a.buttonLike {
      font: inherit;
      color: inherit;
      border: 0;
      text-decoration: none;
      cursor: pointer;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 520px;
      height: 100dvh;
      min-height: 560px;
      margin: 0 auto;
      overflow: hidden;
      background:
        repeating-linear-gradient(116deg, rgba(255,255,255,0.12) 0 2px, transparent 2px 8px),
        repeating-linear-gradient(24deg, rgba(35,99,124,0.035) 0 1px, transparent 1px 7px),
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.05)),
        var(--sky);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.24) inset;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .hidden {
      display: none !important;
    }

    .doodlePanel {
      position: relative;
      border: 4px solid var(--ink);
      border-radius: 30px 24px 34px 26px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.40), rgba(255,255,255,0)),
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.70) 0 10%, transparent 11%),
        var(--paper);
      box-shadow: 8px 10px 0 rgba(41,32,26,0.14);
    }

    .doodlePanel::before,
    .doodleButton::before,
    .key::before,
    .resultCard::before,
    .backButton::before,
    .soundToggle::before {
      content: "";
      position: absolute;
      inset: -4px;
      border: 2px solid rgba(41,32,26,0.38);
      border-radius: inherit;
      pointer-events: none;
      transform: translate(2px, -1px) rotate(-0.7deg);
      opacity: 0.78;
    }

    .doodlePanel::after,
    .doodleButton::after,
    .key::after,
    .resultCard::after,
    .backButton::after,
    .soundToggle::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        repeating-linear-gradient(145deg, rgba(255,255,255,0.20) 0 1px, transparent 1px 5px),
        repeating-linear-gradient(20deg, rgba(54,38,26,0.075) 0 1px, transparent 1px 6px),
        radial-gradient(circle at 28% 32%, rgba(255,255,255,0.18) 0 1px, transparent 1.4px);
      mix-blend-mode: multiply;
      opacity: 0.82;
    }

    /* Start screen */
    .startScreen {
      justify-content: center;
      align-items: center;
      padding: max(18px, env(safe-area-inset-top)) 22px max(20px, env(safe-area-inset-bottom));
      gap: 16px;
    }

    .cloud {
      position: absolute;
      pointer-events: none;
      width: 120px;
      height: 44px;
      border: 4px solid rgba(41,32,26,0.42);
      border-radius: 999px;
      background: rgba(255,255,255,0.58);
      filter: drop-shadow(3px 5px 0 rgba(255,255,255,0.22));
    }
    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border: inherit;
      border-bottom: 0;
      border-radius: 999px 999px 0 0;
    }
    .cloud::before { width: 54px; height: 42px; left: 18px; top: -26px; }
    .cloud::after { width: 44px; height: 34px; right: 20px; top: -20px; }
    .cloudOne { top: 60px; left: -44px; transform: rotate(-4deg) scale(0.92); }
    .cloudTwo { top: 128px; right: -44px; transform: rotate(5deg) scale(0.82); }
    .cloudThree { bottom: 154px; left: -58px; transform: rotate(3deg) scale(0.72); opacity: 0.7; }

    .startCard {
      width: min(100%, 430px);
      padding: 24px 20px 22px;
      text-align: center;
      z-index: 1;
    }

    .gameTitle {
      margin: 0;
      font-size: clamp(2.1rem, 10vw, 3.15rem);
      line-height: 1.02;
      letter-spacing: -0.06em;
      text-shadow: 3px 3px 0 #ffffff, 5px 5px 0 rgba(41,32,26,0.14);
    }

    .subTitle {
      margin: 8px 0 12px;
      font-size: 1rem;
      font-weight: 900;
      color: #32687a;
      letter-spacing: 0.03em;
    }

    .startDescription {
      margin: 6px 0 16px;
      color: var(--soft-ink);
      font-size: 1.02rem;
      line-height: 1.48;
      font-weight: 750;
    }

    .startMascot {
      height: 190px;
      margin: 2px auto 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: scale(0.92);
    }

    .startActions {
      display: grid;
      gap: 10px;
      width: min(100%, 300px);
      margin: 0 auto;
    }

    .doodleButton {
      position: relative;
      min-height: 52px;
      padding: 12px 18px;
      border: 4px solid var(--ink);
      border-radius: 18px 22px 17px 24px;
      background: #fffaf0;
      box-shadow: 5px 7px 0 rgba(41,32,26,0.16);
      font-size: 1.05rem;
      font-weight: 1000;
      transition: transform 100ms ease, box-shadow 100ms ease, filter 120ms ease;
    }

    .doodleButton.primary {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.40), transparent),
        #ffd65f;
      font-size: 1.25rem;
      letter-spacing: 0.06em;
    }

    .doodleButton.secondary { background: #dff8ff; }
    .doodleButton.ghost { background: #fff5c9; }
    .doodleButton:active {
      transform: translate(3px, 4px) rotate(-1deg);
      box-shadow: 2px 3px 0 rgba(41,32,26,0.16);
    }

    .doodlePanel,
    .doodleButton,
    .key,
    .resultCard {
      filter: url(#roughPencilEdge);
    }

    .doodleButton,
    .key,
    .backButton,
    .soundToggle {
      overflow: visible;
    }

    .soundToggle {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      right: 14px;
      z-index: 3;
      min-height: 36px;
      padding: 7px 12px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: rgba(255, 253, 241, 0.86);
      box-shadow: 3px 4px 0 rgba(41,32,26,0.14);
      filter: url(#roughPencilEdge);
      font-weight: 1000;
      font-size: 0.84rem;
    }

    .versionText {
      position: absolute;
      right: 12px;
      bottom: max(8px, env(safe-area-inset-bottom));
      font-size: 0.72rem;
      font-weight: 900;
      color: rgba(41,32,26,0.52);
      z-index: 5;
    }

    /* Play screen */
    .playScreen {
      background:
        repeating-linear-gradient(117deg, rgba(255,255,255,0.14) 0 2px, transparent 2px 8px),
        repeating-linear-gradient(25deg, rgba(35,99,124,0.04) 0 1px, transparent 1px 7px),
        linear-gradient(180deg, rgba(255,255,255,0.24), rgba(255,255,255,0.03)),
        var(--sky);
    }

    .topBar {
      height: calc(48px + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) 12px 0;
      display: grid;
      grid-template-columns: 42px 1fr 58px;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      z-index: 5;
    }

    .backButton {
      position: relative;
      width: 38px;
      height: 38px;
      border: 3px solid var(--ink);
      border-radius: 14px 12px 16px 12px;
      background: var(--cream);
      box-shadow: 3px 4px 0 rgba(41,32,26,0.14);
      filter: url(#roughPencilEdge);
      font-size: 1.7rem;
      line-height: 1;
      font-weight: 1000;
    }

    .topTitle {
      text-align: center;
      font-weight: 1000;
      letter-spacing: -0.04em;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.70);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .balloonCount {
      justify-self: end;
      padding: 5px 9px;
      border: 3px solid rgba(41,32,26,0.78);
      border-radius: 999px;
      background: rgba(255,253,241,0.75);
      font-size: 0.86rem;
      font-weight: 1000;
    }

    .playMain {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .skyArea {
      position: relative;
      flex: 1 1 auto;
      min-height: 210px;
      margin: 0 10px;
      overflow: hidden;
      border-radius: 28px;
    }

    .skyArea::before {
      content: "";
      position: absolute;
      inset: 8px 0 auto;
      height: 80%;
      background:
        radial-gradient(ellipse at 18% 68%, rgba(255,255,255,0.42) 0 5%, transparent 6%),
        radial-gradient(ellipse at 82% 42%, rgba(255,255,255,0.34) 0 5%, transparent 6%);
      opacity: 0.85;
    }

    .balloonCluster {
      position: absolute;
      top: 6px;
      left: 50%;
      width: 240px;
      height: 112px;
      transform: translateX(-50%);
      z-index: 2;
    }

    .balloon {
      position: absolute;
      width: 54px;
      height: 66px;
      border: 4px solid var(--ink);
      border-radius: 52% 46% 50% 48% / 56% 58% 42% 42%;
      background-image:
        repeating-linear-gradient(110deg, rgba(255,255,255,0.22) 0 2px, transparent 2px 7px),
        repeating-linear-gradient(20deg, rgba(41,32,26,0.08) 0 1px, transparent 1px 5px);
      background-blend-mode: screen, multiply;
      box-shadow: inset -7px -8px 0 rgba(41,32,26,0.08), 3px 5px 0 rgba(41,32,26,0.12), 1px -1px 0 rgba(41,32,26,0.22);
      transform-origin: 50% 100%;
      animation: balloonBob 2.7s ease-in-out infinite;
      filter: url(#roughPencilEdge);
    }
    .balloon::before {
      content: "";
      position: absolute;
      top: 9px;
      left: 12px;
      width: 14px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.42);
      transform: rotate(18deg);
    }
    .balloon::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -13px;
      width: 15px;
      height: 14px;
      transform: translateX(-50%) rotate(45deg);
      border: 3px solid var(--ink);
      border-left: 0;
      border-top: 0;
      background: inherit;
    }
    .balloon .popWord {
      display: none;
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%) rotate(-10deg);
      color: var(--ink);
      font-size: 0.8rem;
      font-weight: 1000;
      text-shadow: 1px 1px 0 white;
    }
    .balloon.popped {
      animation: popBalloon 330ms ease-out forwards;
    }
    .balloon.popped .popWord { display: block; }
    .balloon:nth-child(1) { left: 28px; top: 30px; background-color: #ff9fba; transform: rotate(-11deg); animation-delay: -0.3s; }
    .balloon:nth-child(2) { left: 68px; top: 0; background-color: #ffe06d; transform: rotate(5deg); animation-delay: -1.2s; }
    .balloon:nth-child(3) { left: 110px; top: 26px; background-color: #9fe7ff; transform: rotate(-4deg); animation-delay: -0.8s; }
    .balloon:nth-child(4) { left: 150px; top: 4px; background-color: #aef19b; transform: rotate(9deg); animation-delay: -1.7s; }
    .balloon:nth-child(5) { left: 184px; top: 36px; background-color: #d2b2ff; transform: rotate(13deg); animation-delay: -0.6s; }
    .balloon:nth-child(6) { left: 8px; top: 4px; background-color: #ffbf75; transform: rotate(-7deg); animation-delay: -1.4s; }

    .stringBundle {
      position: absolute;
      left: 50%;
      top: 82px;
      width: 156px;
      height: 100px;
      transform: translateX(-50%);
      z-index: 1;
      pointer-events: none;
    }
    .stringBundle span {
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 98px;
      border-radius: 999px;
      background: rgba(41,32,26,0.72);
      transform-origin: top center;
    }
    .stringBundle span:nth-child(1) { transform: translateX(-50%) rotate(-31deg); }
    .stringBundle span:nth-child(2) { transform: translateX(-50%) rotate(-18deg); }
    .stringBundle span:nth-child(3) { transform: translateX(-50%) rotate(-6deg); }
    .stringBundle span:nth-child(4) { transform: translateX(-50%) rotate(8deg); }
    .stringBundle span:nth-child(5) { transform: translateX(-50%) rotate(20deg); }
    .stringBundle span:nth-child(6) { transform: translateX(-50%) rotate(32deg); }

    .characterActor {
      position: absolute;
      left: 50%;
      top: 92px;
      width: min(230px, 58vw);
      height: min(245px, 58vw);
      transform: translateX(-50%);
      transform-origin: 50% 10%;
      z-index: 3;
      animation: actorFloat 3s ease-in-out infinite;
      will-change: transform;
    }
    .characterActor svg { width: 100%; height: 100%; overflow: visible; }
    .startMascot.characterActor {
      position: relative;
      left: auto;
      top: auto;
      width: 190px;
      height: 190px;
      transform: none;
      margin-left: auto;
      margin-right: auto;
    }
    .characterActor.mood-correct { animation: actorCorrect 500ms ease-out; }
    .characterActor.mood-wrong { animation: actorWrong 430ms ease-in-out; }
    .characterActor.mood-clear { animation: actorClear 780ms ease-in-out infinite alternate; }
    .characterActor.mood-falling { animation: actorFall 820ms cubic-bezier(.18,.83,.6,1) forwards; }

    .characterActor.mood-falling ~ .stringBundle,
    .skyArea.falling .stringBundle { opacity: 0; }

    .wordPanel {
      flex: 0 0 auto;
      padding: 4px 12px 8px;
      text-align: center;
      z-index: 6;
    }

    .wordSlots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(4px, 1.3vw, 8px);
      min-height: 54px;
      padding: 4px 6px;
    }

    .slot {
      width: clamp(30px, 8.4vw, 42px);
      height: 48px;
      display: grid;
      place-items: center;
      border-bottom: 5px solid var(--ink);
      font-size: clamp(1.35rem, 7vw, 2rem);
      font-weight: 1000;
      line-height: 1;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
    }

    .messageBox {
      min-height: 26px;
      font-size: 0.95rem;
      font-weight: 950;
      color: #315f70;
      letter-spacing: -0.02em;
    }

    .keyboard {
      flex: 0 0 auto;
      padding: 6px 10px max(10px, env(safe-area-inset-bottom));
      display: grid;
      gap: 7px;
      z-index: 7;
    }
    .keyboardRow {
      display: grid;
      gap: 7px;
      justify-content: center;
    }
    .keyboardRow.row7 { grid-template-columns: repeat(7, minmax(0, 1fr)); }
    .keyboardRow.row5 { grid-template-columns: repeat(5, minmax(0, 1fr)); padding: 0 12%; }

    .key {
      position: relative;
      min-height: 42px;
      border: 3px solid var(--ink);
      border-radius: 14px 12px 16px 13px;
      background: #fffdf3;
      box-shadow: 3px 4px 0 rgba(41,32,26,0.13);
      font-size: 1.12rem;
      font-weight: 1000;
      transition: transform 80ms ease, box-shadow 80ms ease, filter 120ms ease, opacity 120ms ease;
    }
    .key:active:not(:disabled) {
      transform: translate(2px, 3px) rotate(-1deg);
      box-shadow: 1px 2px 0 rgba(41,32,26,0.13);
    }
    .key.correct {
      background: linear-gradient(145deg, rgba(255,255,255,0.38), transparent), var(--green);
      border-color: #23592a;
      color: #163c1c;
      filter: saturate(1.05);
    }
    .key.wrong {
      background: linear-gradient(145deg, rgba(255,255,255,0.34), transparent), var(--red);
      border-color: #6e2a22;
      color: #5b211b;
    }
    .key:disabled {
      cursor: default;
      opacity: 0.88;
    }

    /* Result overlay */
    .resultOverlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(35, 68, 83, 0.24);
      backdrop-filter: blur(2px);
    }

    .resultCard {
      position: relative;
      width: min(100%, 390px);
      padding: 24px 20px 20px;
      text-align: center;
      border: 4px solid var(--ink);
      border-radius: 28px 22px 32px 24px;
      background: var(--paper);
      box-shadow: 8px 10px 0 rgba(41,32,26,0.18);
      animation: resultPop 280ms cubic-bezier(.18,.95,.35,1.22);
    }

    .resultTitle {
      margin: 0 0 8px;
      font-size: clamp(2.1rem, 10vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
      text-shadow: 3px 3px 0 #fff, 5px 5px 0 rgba(41,32,26,0.12);
    }
    .resultTitle.clear { color: #237a37; }
    .resultTitle.gameover { color: #a53a2f; }
    .resultNote {
      margin: 0 0 14px;
      font-weight: 900;
      color: var(--soft-ink);
    }
    .answerLabel {
      margin: 14px 0 4px;
      font-size: 0.86rem;
      font-weight: 1000;
      color: #437083;
    }
    .answerWord {
      margin: 0;
      font-size: clamp(2rem, 11vw, 3rem);
      line-height: 1.05;
      font-weight: 1000;
      letter-spacing: 0.08em;
    }
    .answerMeaning {
      margin: 4px 0 18px;
      font-size: 1.25rem;
      font-weight: 900;
    }
    .resultActions {
      display: grid;
      gap: 9px;
      width: min(100%, 290px);
      margin: 0 auto;
    }

    /* Character SVG */
    .doodleSvg {
      filter: url(#roughPencilLine);
    }
    .doodleSvg .line {
      fill: none;
      stroke: var(--ink);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .doodleSvg .thinLine {
      fill: none;
      stroke: var(--ink);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .doodleSvg .sketchLine {
      fill: none;
      stroke: rgba(41,32,26,0.34);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .doodleSvg .faceFill { fill: #fff3d2; }
    .doodleSvg .cheek { fill: rgba(255,124,116,0.30); }
    .doodleSvg .eyeDot { fill: #201915; }
    .doodleSvg .mouth-smile,
    .doodleSvg .mouth-o,
    .doodleSvg .mouth-sad { display: none; }
    .mood-correct .mouth-idle,
    .mood-clear .mouth-idle,
    .mood-wrong .mouth-idle,
    .mood-falling .mouth-idle,
    .mood-gameover .mouth-idle { display: none; }
    .mood-correct .mouth-smile,
    .mood-clear .mouth-smile { display: block; }
    .mood-wrong .mouth-o,
    .mood-falling .mouth-o { display: block; }
    .mood-gameover .mouth-sad { display: block; }
    .mood-wrong .eyeDot,
    .mood-falling .eyeDot { transform: translateY(-4px); }
    .mood-wrong .eyeGroup,
    .mood-falling .eyeGroup { transform: scale(1.12); transform-origin: center; transform-box: fill-box; }
    .leftArm, .rightArm, .leftLeg, .rightLeg { transform-box: fill-box; transform-origin: center top; }
    .mood-falling .leftArm { animation: flailLeft 160ms linear infinite alternate; }
    .mood-falling .rightArm { animation: flailRight 140ms linear infinite alternate; }
    .mood-falling .leftLeg { animation: legKickLeft 145ms linear infinite alternate; }
    .mood-falling .rightLeg { animation: legKickRight 155ms linear infinite alternate; }
    .mood-falling .headGroup { animation: lookUp 820ms ease-out forwards; transform-origin: 50% 50%; transform-box: fill-box; }

    @keyframes balloonBob {
      0%, 100% { margin-top: 0; }
      50% { margin-top: -6px; }
    }
    @keyframes popBalloon {
      0% { opacity: 1; transform: scale(1) rotate(var(--r, 0deg)); filter: blur(0); }
      45% { opacity: 1; transform: scale(1.22) rotate(5deg); }
      100% { opacity: 0; transform: scale(0.12) rotate(-20deg); filter: blur(1px); }
    }
    @keyframes actorFloat {

  <script src="./words.js"></script>
  <script>
    (() => {
      'use strict';

      const CONFIG = Object.freeze({
        version: 'v0.1.4',
        gameHeavenUrl: 'https://kih0o0n.github.io/DDingboGameHeaven/',
        maxWrong: 7,
        recentWordMemory: 5,
        balloonPopOrder: [6, 5, 4, 0, 1, 2, 3],
        clearDelayMs: 400,
        gameOverDelayMs: 800,
        keyboardRows: ['ABCDEFG', 'HIJKLMN', 'OPQRSTU', 'VWXYZ']
      });

      const refs = {};
      const state = {
        screen: 'start',
        currentEntry: null,
        guessedLetters: new Set(),
        correctLetters: new Set(),
        wrongLetters: new Set(),
        remainingBalloons: CONFIG.maxWrong,
        revealAnswer: false,
        recentWords: [],
        acceptingInput: false,
        lastWord: null,
        resultTimer: null,
        moodTimer: null
      };

      const wordLibrary = normalizeWordLibrary(window.WORD_LIBRARY);

      const sound = {
        enabled: localStorage.getItem('balloonHangmanSound') !== 'off',
        ctx: null,
        unlock() {
          if (!this.enabled) return;
          if (!this.ctx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            this.ctx = new AudioContext();
          }
          if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        tone(freq, duration = 0.08, type = 'sine', gainValue = 0.045, startDelay = 0) {
          if (!this.enabled) return;
          this.unlock();
          if (!this.ctx) return;
          const now = this.ctx.currentTime + startDelay;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
          osc.connect(gain).connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + duration + 0.02);
        },
        tap() { this.tone(420, 0.045, 'triangle', 0.035); },
        correct() {
          this.tone(620, 0.08, 'sine', 0.075);
          this.tone(820, 0.09, 'sine', 0.065, 0.055);
        },
        pop() {
          if (!this.enabled) return;
          this.unlock();
          if (!this.ctx) return;
          const now = this.ctx.currentTime;
          const bufferSize = Math.floor(this.ctx.sampleRate * 0.12);
          const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            const t = i / bufferSize;
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 1.7);
          }
          const noise = this.ctx.createBufferSource();
          const gain = this.ctx.createGain();
          const filter = this.ctx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.setValueAtTime(1250, now);
          filter.Q.setValueAtTime(0.85, now);
          gain.gain.setValueAtTime(0.42, now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
          noise.buffer = buffer;
          noise.connect(filter).connect(gain).connect(this.ctx.destination);
          noise.start(now);
          noise.stop(now + 0.13);

          const snap = this.ctx.createOscillator();
          const snapGain = this.ctx.createGain();
          snap.type = 'square';
          snap.frequency.setValueAtTime(180, now);
          snap.frequency.exponentialRampToValueAtTime(92, now + 0.08);
          snapGain.gain.setValueAtTime(0.09, now);
          snapGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
          snap.connect(snapGain).connect(this.ctx.destination);
          snap.start(now);
          snap.stop(now + 0.1);
        },
        success() {
          [523, 659, 784, 1046].forEach((freq, idx) => this.tone(freq, 0.10, 'triangle', 0.075, idx * 0.06));
        },
        fail() {
          if (!this.enabled) return;
          this.unlock();
          if (!this.ctx) return;
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(360, now);
          osc.frequency.exponentialRampToValueAtTime(90, now + 0.45);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.48);
          osc.connect(gain).connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.5);
        }
      };

      document.addEventListener('DOMContentLoaded', init);

      function init() {
        refs.app = document.getElementById('app');
        refs.startScreen = document.getElementById('startScreen');
        refs.playScreen = document.getElementById('playScreen');
        refs.resultOverlay = document.getElementById('resultOverlay');
        refs.startMascot = document.getElementById('startMascot');
        refs.characterActor = document.getElementById('characterActor');
        refs.skyArea = document.getElementById('skyArea');
        refs.balloonCluster = document.getElementById('balloonCluster');
        refs.stringBundle = document.getElementById('stringBundle');
        refs.balloonCount = document.getElementById('balloonCount');
        refs.wordSlots = document.getElementById('wordSlots');
        refs.messageBox = document.getElementById('messageBox');
        refs.keyboard = document.getElementById('keyboard');
        refs.resultTitle = document.getElementById('resultTitle');
        refs.resultNote = document.getElementById('resultNote');
        refs.answerWord = document.getElementById('answerWord');
        refs.answerMeaning = document.getElementById('answerMeaning');
        refs.resultBalloons = document.getElementById('resultBalloons');
        refs.soundToggle = document.getElementById('soundToggle');
        refs.startHeavenLink = document.getElementById('startHeavenLink');
        refs.resultHeavenLink = document.getElementById('resultHeavenLink');
        refs.versionText = document.getElementById('versionText');

        refs.versionText.textContent = CONFIG.version;
        refs.startMascot.innerHTML = getCharacterSvg();
        refs.characterActor.innerHTML = getCharacterSvg();

        buildKeyboard();
        updateSoundToggle();

        document.getElementById('startBtn').addEventListener('click', () => {
          sound.unlock();
          sound.tap();
          if (wordLibrary.length === 0) {
            setStartDescriptionError();
            return;
          }
          startGame();
        });
        document.getElementById('backToStartBtn').addEventListener('click', () => {
          sound.tap();
          showStartScreen();
        });
        document.getElementById('againBtn').addEventListener('click', () => {
          sound.tap();
          startGame();
        });
        document.getElementById('resultStartBtn').addEventListener('click', () => {
          sound.tap();
          showStartScreen();
        });
        refs.soundToggle.addEventListener('click', () => {
          sound.enabled = !sound.enabled;
          localStorage.setItem('balloonHangmanSound', sound.enabled ? 'on' : 'off');
          updateSoundToggle();
          if (sound.enabled) {
            sound.unlock();
            sound.correct();
          }
        });

        document.addEventListener('keydown', event => {
          if (!state.acceptingInput || state.screen !== 'playing') return;
          const letter = event.key.toUpperCase();
          if (/^[A-Z]$/.test(letter)) handleGuess(letter);
        });

        showStartScreen();
      }

      function normalizeWordLibrary(rawLibrary) {
        if (!Array.isArray(rawLibrary)) return [];
        const seen = new Set();
        return rawLibrary
          .map(entry => ({
            word: String(entry.word || '').trim().toUpperCase(),
            meaning: String(entry.meaning || '').trim()
          }))
          .filter(entry => {
            if (!/^[A-Z]{5,9}$/.test(entry.word)) return false;
            if (!entry.meaning) return false;
            if (seen.has(entry.word)) return false;
            seen.add(entry.word);
            return true;
          });
      }

      function setStartDescriptionError() {
        const description = document.querySelector('.startDescription');
        description.innerHTML = 'words.js 단어 라이브러리를<br>먼저 확인해 주세요!';
      }

      function updateSoundToggle() {
        refs.soundToggle.textContent = sound.enabled ? '🔊 효과음 ON' : '🔇 효과음 OFF';
        refs.soundToggle.setAttribute('aria-pressed', String(sound.enabled));
      }

      function showStartScreen() {
        clearTimers();
        state.screen = 'start';
        state.acceptingInput = false;
        refs.startScreen.classList.remove('hidden');
        refs.playScreen.classList.add('hidden');
        refs.resultOverlay.classList.add('hidden');
        refs.skyArea.classList.remove('falling');
        setMood(refs.startMascot, 'idle');
      }

      function startGame() {
        clearTimers();
        state.screen = 'playing';
        state.currentEntry = pickWord();
        rememberRecentWord(state.currentEntry.word);
        state.guessedLetters = new Set();
        state.correctLetters = new Set();
        state.wrongLetters = new Set();
        state.remainingBalloons = CONFIG.maxWrong;
        state.revealAnswer = false;
        state.acceptingInput = true;
        state.lastWord = state.currentEntry.word;

        refs.startScreen.classList.add('hidden');
        refs.playScreen.classList.remove('hidden');
        refs.resultOverlay.classList.add('hidden');
        refs.skyArea.classList.remove('falling');
        refs.characterActor.innerHTML = getCharacterSvg();
        setMood(refs.characterActor, 'idle');

        renderBalloons();
        renderStrings();
        renderWordSlots();
        renderKeyboard();
        renderBalloonCount();
        setMessage('알파벳을 골라보세요!');
      }

      function clearTimers() {
        if (state.resultTimer) clearTimeout(state.resultTimer);
        if (state.moodTimer) clearTimeout(state.moodTimer);
        state.resultTimer = null;
        state.moodTimer = null;
      }

      function pickWord() {
        const recentSet = new Set(state.recentWords);
        let pool = wordLibrary.filter(entry => !recentSet.has(entry.word));
        if (pool.length === 0) pool = wordLibrary;
        return pool[Math.floor(Math.random() * pool.length)];
      }

      function rememberRecentWord(word) {
        state.recentWords = state.recentWords.filter(item => item !== word);
        state.recentWords.push(word);
        while (state.recentWords.length > CONFIG.recentWordMemory) {
          state.recentWords.shift();
        }
      }

      function buildKeyboard() {
        refs.keyboard.innerHTML = '';
        CONFIG.keyboardRows.forEach(rowText => {
          const row = document.createElement('div');
          row.className = `keyboardRow row${rowText.length}`;
          rowText.split('').forEach(letter => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'key';
            button.textContent = letter;
            button.dataset.letter = letter;
            button.setAttribute('aria-label', `${letter} 선택`);
            button.addEventListener('click', () => handleGuess(letter));
            row.appendChild(button);
          });
          refs.keyboard.appendChild(row);
        });
      }

      function handleGuess(letter) {
        if (!state.acceptingInput || state.guessedLetters.has(letter)) return;
        sound.unlock();
        state.guessedLetters.add(letter);

        if (state.currentEntry.word.includes(letter)) {
          state.correctLetters.add(letter);
          sound.correct();
          setMessage(randomPick(['좋아요!', '맞았어요!', 'NICE!', 'GOOD!']));
          setMood(refs.characterActor, 'correct');
          renderWordSlots();
          renderKeyboard();

          if (isWordComplete()) {
            state.acceptingInput = false;
            setMood(refs.characterActor, 'clear');
            sound.success();
            state.resultTimer = setTimeout(() => showResult('clear'), CONFIG.clearDelayMs);
          } else {
            queueMoodIdle(560);
          }
          return;
        }

        state.wrongLetters.add(letter);
        state.remainingBalloons = CONFIG.maxWrong - state.wrongLetters.size;
        sound.pop();
        popNextBalloon();
        renderKeyboard();
        renderBalloonCount();

        if (state.remainingBalloons <= 0) {
          state.acceptingInput = false;
          setMessage('앗! 마지막 풍선이 터졌어요!');
          refs.skyArea.classList.add('falling');
          setMood(refs.characterActor, 'falling');
          state.revealAnswer = true;
          renderWordSlots();
          sound.fail();
          state.resultTimer = setTimeout(() => showResult('gameover'), CONFIG.gameOverDelayMs);
        } else {
          setMessage(randomPick(['Oops!', '풍선 하나가 터졌어요!', '다시 골라보세요!']));
          setMood(refs.characterActor, 'wrong');
          queueMoodIdle(520);
        }
      }

      function queueMoodIdle(delayMs) {
        if (state.moodTimer) clearTimeout(state.moodTimer);
        state.moodTimer = setTimeout(() => {
          if (state.screen === 'playing' && state.acceptingInput) setMood(refs.characterActor, 'idle');
        }, delayMs);
      }

      function isWordComplete() {
        return [...new Set(state.currentEntry.word.split(''))].every(letter => state.correctLetters.has(letter));
      }

      function renderBalloons() {
        refs.balloonCluster.innerHTML = Array.from({ length: CONFIG.maxWrong }, (_, index) => (
          `<div class="balloon" data-index="${index}"><span class="popWord">POP!</span></div>`
        )).join('');
      }

      function renderStrings() {
        const paths = [
          'M28 82 C42 112 58 137 78 158',
          'M62 35 C66 82 71 121 78 158',
          'M104 25 C98 76 89 120 78 158',
          'M143 56 C123 95 100 127 78 158',
          'M181 25 C145 77 111 119 78 158',
          'M220 52 C166 96 125 129 78 158',
          'M260 88 C190 114 137 138 78 158'
        ];
        refs.stringBundle.innerHTML = paths.map((d, index) =>
          `<path data-index="${index}" d="${d}" />`
        ).join('');
      }

      function popNextBalloon() {
        const popPosition = state.wrongLetters.size - 1;
        const index = CONFIG.balloonPopOrder[popPosition] ?? (CONFIG.maxWrong - state.wrongLetters.size);
        const balloon = refs.balloonCluster.querySelector(`[data-index="${index}"]`);
        const string = refs.stringBundle.querySelector(`[data-index="${index}"]`);
        if (balloon) balloon.classList.add('popped');
        if (string) string.classList.add('popped');
      }

      function renderBalloonCount() {
        refs.balloonCount.textContent = `🎈 ${Math.max(0, state.remainingBalloons)}`;
      }

      function renderWordSlots() {
        const word = state.currentEntry.word;
        refs.wordSlots.innerHTML = word.split('').map(letter => {
          const shown = state.revealAnswer || state.correctLetters.has(letter) ? letter : '';
          return `<span class="slot">${shown}</span>`;
        }).join('');
      }

      function renderKeyboard() {
        refs.keyboard.querySelectorAll('.key').forEach(button => {
          const letter = button.dataset.letter;
          button.classList.remove('correct', 'wrong');
          if (state.correctLetters.has(letter)) button.classList.add('correct');
          if (state.wrongLetters.has(letter)) button.classList.add('wrong');
          button.disabled = state.guessedLetters.has(letter) || !state.acceptingInput;
        });
      }

      function setMessage(text) {
        refs.messageBox.textContent = text;
      }

      function showResult(kind) {
        state.screen = 'result';
        state.acceptingInput = false;
        renderKeyboard();

        const isClear = kind === 'clear';
        refs.resultTitle.textContent = isClear ? 'CLEAR!' : 'GAME OVER';
        refs.resultTitle.className = `resultTitle ${isClear ? 'clear' : 'gameover'}`;
        refs.resultNote.textContent = isClear ? '풍선을 지켰어요!' : '풍선이 모두 터졌어요...';
        refs.resultBalloons.textContent = `남은 풍선: ${Math.max(0, state.remainingBalloons)}개`;
        refs.answerWord.textContent = state.currentEntry.word;
        refs.answerMeaning.textContent = state.currentEntry.meaning;
        refs.resultOverlay.classList.remove('hidden');
      }

      function setMood(element, mood) {
        element.classList.remove('mood-idle', 'mood-correct', 'mood-wrong', 'mood-clear', 'mood-falling', 'mood-gameover');
        void element.offsetWidth;
        element.classList.add(`mood-${mood}`);
      }

      function randomPick(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function getCharacterSvg() {
        return `
          <svg class="doodleSvg" viewBox="0 0 220 245" role="img" aria-label="풍선 행맨 졸라맨 캐릭터">
            <g class="bodyGroup">
              <path class="line leftArm" d="M107 151 C91 139 82 128 76 115" />
              <circle class="handFill gripHand" cx="74" cy="112" r="8" />
              <path class="gripLine" d="M69 111 C72 116 77 116 81 112" />
              <path class="line rightArm" d="M115 151 C136 159 151 173 164 190" />
              <circle class="handFill" cx="165" cy="190" r="6.5" />
              <path class="line" d="M111 143 C112 164 112 183 110 202" />
              <path class="line leftLeg" d="M110 200 C98 216 88 226 78 236" />
              <path class="line rightLeg" d="M110 200 C124 216 135 226 147 236" />
            </g>
            <g class="headGroup">
              <circle class="faceFill line" cx="111" cy="84" r="51" />
              <g class="eyeGroup">
                <circle class="eyeDot" cx="95" cy="84" r="5.8" />
                <circle class="eyeDot" cx="127" cy="84" r="5.8" />
              </g>
              <ellipse class="cheek" cx="83" cy="103" rx="9" ry="5.5" />
              <ellipse class="cheek" cx="139" cy="103" rx="9" ry="5.5" />
              <path class="thinLine mouth-idle" d="M99 111 C105 116 117 116 123 111" />
              <path class="thinLine mouth-smile" d="M96 109 C103 122 120 122 127 109" />
              <ellipse class="mouth-o" cx="112" cy="115" rx="9" ry="12" fill="#2a201b" stroke="#29201a" stroke-width="5" />
              <path class="thinLine mouth-sad" d="M98 121 C105 114 119 114 126 121" />
            </g>
          </svg>`;
      }
    })();
  </script>
</body>
</html>
